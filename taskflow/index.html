window.focusRemove=(tid)=>{
  S.focusNow=(S.focusNow||[]).filter(x=>x!==tid);
  saveData();render();
};

window.focusComplete=(tid)=>{
  S.focusNow=(S.focusNow||[]).filter(x=>x!==tid);
  const t=S.tasks.find(x=>x.id===tid);
  if(t){const proj=S.projects.find(p=>p.id===t.projectId);const dc=proj?.columns.find(c=>c.id==='done');if(dc)t.columnId=dc.id;}
  saveData();render();
};

window.focusToggle=(tid)=>{
  if(!S.focusNow)S.focusNow=[];
  if(!S.focusDate)S.focusDate=TODAY;
  const idx=S.focusNow.indexOf(tid);
  if(idx>-1){S.focusNow.splice(idx,1);}
  else if(S.focusNow.length<3){S.focusNow.push(tid);S.focusDate=TODAY;}
  saveData();render();
};

window.focusOpenSel=()=>{
  const isDone=t=>{const p=S.projects.find(x=>x.id===t.projectId);return t.columnId===p?.columns.find(c=>c.id==='done')?.id;};
  const avail=S.tasks.filter(t=>!isDone(t)&&!(S.focusNow||[]).includes(t.id));
  let h=`<div class="pdia-sel-overlay" id="focus-sel-overlay" onclick="if(event.target.id==='focus-sel-overlay')this.remove()">
    <div class="pdia-sel-sheet">
      <div class="pdia-sel-title">Agregar al foco</div>`;
  const byProj={};
  avail.forEach(t=>{if(!byProj[t.projectId])byProj[t.projectId]=[];byProj[t.projectId].push(t);});
  Object.entries(byProj).forEach(([pid,tasks])=>{
    const proj=S.projects.find(p=>p.id===pid);if(!proj)return;
    h+=`<div style="font-size:11px;font-weight:600;color:var(--text3);margin:12px 0 6px;letter-spacing:.5px">${proj.icon} ${esc(proj.name)}</div>`;
    tasks.forEach(t=>{
      h+=`<div class="pdia-sel-item" onclick="focusToggle('${t.id}');document.getElementById('focus-sel-overlay').remove()">${esc(t.title)}</div>`;
    });
  });
  if(!avail.length)h+=`<div class="pdia-empty">No hay tareas disponibles</div>`;
  h+=`</div></div>`;
  document.body.insertAdjacentHTML('beforeend',h);
};


// ── HELPER: check if task is done ──
function isTaskDone(t){
  const p=S.projects.find(x=>x.id===t.projectId);
  return t.columnId===p?.columns.find(c=>c.id==='done')?.id;
}
// ── TODAY VIEW MODE (0=agenda, 1=lista) ──
let todayViewMode=0;
window.setTodayViewMode=(m)=>{todayViewMode=m;document.getElementById('view-today').innerHTML=renderToday();setupTodaySwipe();};

function renderToday(){
  const isDone=t=>{const p=S.projects.find(x=>x.id===t.projectId);return t.columnId===p?.columns.find(c=>c.id==='done')?.id;};

  // ── AGENDA MODE ──
  const renderAgendaDay=(dateStr,pageIdx)=>{
    const allTasks=S.tasks.filter(t=>t.date===dateStr&&!isDone(t));
    const overdue=pageIdx===0?S.tasks.filter(t=>t.date&&t.date<TODAY&&!isDone(t)):[];
    const allForDay=[...allTasks,...overdue.filter(o=>!allTasks.find(t=>t.id===o.id))];

    // Focus tasks
    const focusIds=S.focusNow||[];
    const focusTasks=focusIds.map(id=>S.tasks.find(t=>t.id===id)).filter(t=>t&&!isDone(t));
    let focusHTML='';
    if(focusTasks.length&&pageIdx===0){
      focusHTML=`<div style="padding:10px 16px 0">
        <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px">⚡ En foco</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${focusTasks.map(t=>{
            const proj=S.projects.find(p=>p.id===t.projectId);
            return`<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:var(--bg2);border:1px solid var(--border)">
              <span style="font-size:13px;color:#EF9F27">⚡</span>
              <span style="font-size:13px;font-weight:500;color:var(--text);flex:1">${esc(t.title)}</span>
              ${proj?`<span style="font-size:11px;color:var(--text3)">${proj.icon}</span>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }

    // Classify into blocks by time
    const classifyTime=(t)=>{
      if(!t.time)return null;
      const h=parseInt(t.time.split(':')[0],10);
      if(h<13)return'manana';
      if(h<20)return'tarde';
      return'noche';
    };

    // planDia stores manually assigned tasks per block
    const pd=S.planDia&&S.planDia.date===dateStr?S.planDia:{date:dateStr,manana:[],tarde:[],noche:[]};
    const assigned=new Set([...pd.manana,...pd.tarde,...pd.noche]);

    const blocks=[
      {key:'manana',icon:'🌅',name:'Mañana',range:'hasta las 13:00'},
      {key:'tarde',icon:'☀️',name:'Tarde',range:'13:00 — 20:00'},
      {key:'noche',icon:'🌙',name:'Noche',range:'desde las 20:00'},
    ];

    // Auto-assign by time if not manually assigned
    const autoAssign={manana:[],tarde:[],noche:[]};
    allForDay.forEach(t=>{
      if(assigned.has(t.id))return;
      const blk=classifyTime(t);
      if(blk)autoAssign[blk].push(t);
    });

    // Pending: no time and not assigned
    const pendTasks=allForDay.filter(t=>!assigned.has(t.id)&&!classifyTime(t));

    let blocksHTML='<div class="agenda-blocks">';
    blocks.forEach(b=>{
      const manualIds=pd[b.key]||[];
      const manualTasks=manualIds.map(id=>S.tasks.find(t=>t.id===id)).filter(Boolean);
      const autoTasks=autoAssign[b.key]||[];
      const bTasks=[...manualTasks,...autoTasks.filter(t=>!manualTasks.find(m=>m.id===t.id))];
      const tasksHTML=bTasks.length?bTasks.map(t=>`
        (()=>{const isOvTask=t.date&&t.date<TODAY&&!isDone(t);return`<div class="agenda-task${isOvTask?' agenda-task-ov':''}" 
          draggable="true"
          data-tid="${t.id}" data-block="${b.key}" data-date="${dateStr}"
          ondragstart="agendaDragStart(event,'${t.id}','${b.key}','${dateStr}')"
          ondragover="agendaDragOver(event)"
          ondrop="agendaDrop(event,'${t.id}','${b.key}','${dateStr}')"
          ondragleave="agendaDragLeave(event)">
          <div class="agenda-task-check" onclick="completeFromPan('${t.id}',this)"></div>
          <span class="agenda-task-title">${esc(t.title)}</span>
          ${t.time?`<span class="agenda-task-time${isOvTask?' agenda-time-ov':''}">${t.time}</span>`:''}
          ${isOvTask?`<span style="font-size:10px;color:var(--c-over);font-weight:600">Vencida</span>`:''}
          <svg class="agenda-task-drag" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="9" y1="5" x2="9" y2="19"/><line x1="15" y1="5" x2="15" y2="19"/></svg>
        </div>`;})()}).join(''):`<div class="agenda-block-empty">Sin tareas</div>`;
      blocksHTML+=`<div class="agenda-block">
        <div class="agenda-block-hdr">
          <span class="agenda-block-icon">${b.icon}</span>
          <span class="agenda-block-name">${b.name}</span>
          <span class="agenda-block-range">${b.range}</span>
        </div>
        <div class="agenda-block-tasks">${tasksHTML}</div>
      </div>`;
    });
    blocksHTML+='</div>';

    // Pendientes del día section
    const pendHTML=`<div class="agenda-fade"></div>
    <div class="pend-zona">
      <div class="pend-zona-hdr">
        <span class="pend-zona-title">Pendientes del día</span>
        <span class="pend-zona-count">${pendTasks.length}</span>
      </div>
      ${pendTasks.length?`<div class="pend-zona-list">${pendTasks.map(t=>{
        const proj=S.projects.find(p=>p.id===t.projectId);
        return`<div class="pend-zona-task" onclick="window._assignDate='${dateStr}';openAssignBlock('${t.id}')" style="cursor:pointer">
          <div class="pend-zona-check" onclick="event.stopPropagation();completeFromPan('${t.id}',this)"></div>
          <span class="pend-zona-title-txt">${esc(t.title)}</span>
          ${proj?`<span class="pend-zona-proj">${proj.icon}</span>`:''}
          <span style="font-size:11px;color:var(--text3);opacity:.5">+ bloque</span>
        </div>`;
      }).join('')}</div>`:'<div style="font-size:12px;color:var(--text3);opacity:.5;text-align:center;padding:12px 0">Sin pendientes 🎉</div>'}
    </div>`;

    return focusHTML+blocksHTML+pendHTML;
  };

  // ── LISTA MODE (vista original mejorada) ──
  const renderListaDay=(dateStr,pageIdx)=>{
    const pend=S.tasks.filter(t=>t.date===dateStr&&!isDone(t));
    const overdue=pageIdx===0?S.tasks.filter(t=>t.date&&t.date<TODAY&&!isDone(t)):[];
    const focusHTML=pageIdx===0?renderFocusNow():'';
    const grp={};
    pend.forEach(t=>{if(!grp[t.projectId])grp[t.projectId]=[];grp[t.projectId].push(t);});
    overdue.forEach(t=>{if(!grp[t.projectId])grp[t.projectId]=[];if(!grp[t.projectId].find(x=>x.id===t.id))grp[t.projectId].push(t);});
    let h=focusHTML;
    if(!pend.length&&!overdue.length){
      h+=`<div class="empty-state"><p>${pageIdx===0?'No hay tareas para hoy':'No hay tareas para mañana'}</p><span>Usá el + para agregar</span></div>`;
    }
    Object.keys(grp).forEach(pid=>{
      const p=S.projects.find(x=>x.id===pid);if(!p)return;
      const dot=palDot(p.palKey);
      const ph=palHdr(p.palKey);
      h+=`<div class="group-block group-block-color" style="--group-color-border:${ph.border};--group-color-bg-hdr:${ph.hdr};--group-color-bg:${ph.hdr}20">
        <div class="group-hdr" style="color:${ph.hdrTxt};--gc:${ph.hdrTxt};background:${ph.hdr};border-bottom:1px solid ${ph.border}">${p.icon} ${esc(p.name)}</div>
        <div class="group-tasks-inner" style="background:#fff">${grp[pid].map(t=>{const card=cardHTML(t,p,{mv:true,showStatus:true});return card.replace('class="task-card','class="task-card" style="border:1.5px solid ${ph.border}"').replace('style="border:1.5px','style="border:1.5px');}).join('')}</div></div>`;
    });
    return h;
  };

  const now=new Date();
  const gr=now.getHours()<12?'Buenos días ☀️':now.getHours()<18?'Buenas tardes 👋':'Buenas noches 🌙';
  const ds=now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  const tmrDate=new Date();tmrDate.setDate(tmrDate.getDate()+1);
  const tmrStr=tmrDate.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

  const renderDay=todayViewMode===0?renderAgendaDay:renderListaDay;

  return`<div class="section" style="padding-bottom:0">
    <p style="font-size:13px;color:var(--text2);margin-bottom:6px">${gr}</p>
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:12px">
      <h1 class="section-title" id="today-main-title" style="font-size:26px;margin-bottom:0">${todayPage===0?'Hoy':'Mañana'}</h1>
      <span style="color:var(--border2);font-size:16px">—</span>
      <span style="font-size:14px;color:var(--text3);text-transform:capitalize">${todayPage===0?ds:tmrStr}</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div class="today-day-tabs-inline">
        <button class="day-tab${todayPage===0?' active':''}" onclick="switchTodayPage(0)">Hoy</button>
        <button class="day-tab${todayPage===1?' active':''}" onclick="switchTodayPage(1)">Mañana</button>
      </div>
      <div class="today-view-toggle">
        <button class="tvt-btn${todayViewMode===0?' active':''}" onclick="setTodayViewMode(0)" title="Agenda">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="7" height="7" rx="1"/><rect x="3" y="13" width="7" height="7" rx="1"/><line x1="13" y1="7" x2="21" y2="7"/><line x1="13" y1="12" x2="21" y2="12"/><line x1="13" y1="17" x2="21" y2="17"/></svg>
        </button>
        <button class="tvt-btn${todayViewMode===1?' active':''}" onclick="setTodayViewMode(1)" title="Lista">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="today-swipe-wrap">
    <div class="today-swipe-track" id="today-swipe-track" style="transform:translateX(${todayPage===0?0:-50}%)">
      <div class="today-swipe-page">${renderDay(TODAY,0)}</div>
      <div class="today-swipe-page">${renderDay(TOMORROW,1)}</div>
    </div>
  </div>`;
}

// ── PANORAMA COLLAPSE STATE ──
function getPanCollapsed(){try{return JSON.parse(localStorage.getItem('pan-collapsed')||'{}');}catch{return{};}}
function setPanCollapsed(state){localStorage.setItem('pan-collapsed',JSON.stringify(state));}

window.togglePanSection=(projId)=>{
  const state=getPanCollapsed();
  state[projId]=!state[projId];
  setPanCollapsed(state);
  // Toggle without full re-render
  const body=document.getElementById('pan-proj-body-'+projId);
  const chevron=document.getElementById('pan-proj-chevron-'+projId);
  if(body){body.style.display=state[projId]?'none':'block';}
  if(chevron){chevron.style.transform=state[projId]?'rotate(-90deg)':'';}
};

function renderPanorama(){
  const prioC={alta:'var(--c-over)',media:'var(--c-mid)',baja:'var(--text3)'};
  const weekStart=getWeekStart();
  const isDone=t=>{const p=S.projects.find(x=>x.id===t.projectId);return t.columnId===p?.columns.find(c=>c.id==='done')?.id;};
  const weekDone=S.tasks.filter(t=>{const p=S.projects.find(x=>x.id===t.projectId);const dc=p?.columns.find(c=>c.id==='done');return t.columnId===dc?.id&&t.createdAt>weekStart;}).length;
  const allPend=S.tasks.filter(t=>!isDone(t)).length;

  let h=`<div class="pan-stats">
    <div class="pan-stat-chip"><span class="pan-stat-num">${weekDone}</span><span class="pan-stat-lbl">Esta semana ✓</span></div>
    <div class="pan-stat-chip"><span class="pan-stat-num">${allPend}</span><span class="pan-stat-lbl">Total pendientes</span></div>
    <div class="pan-stat-chip"><span class="pan-stat-num">${S.streak||0}🔥</span><span class="pan-stat-lbl">Racha días</span></div>
  </div>`;

  if(!S.projects.length)return h+`<div class="empty-state" style="margin-top:40px"><p>No hay categorías</p></div>`;

  const sorted=[...S.projects].sort((a,b)=>(a.order??0)-(b.order??0));

  sorted.forEach(proj=>{
    const dot=palDot(proj.palKey);
    const doneId=proj.columns.find(c=>c.id==='done')?.id;
    const tasks=S.tasks.filter(t=>t.projectId===proj.id);
    if(!tasks.length)return;
    const prioOrder={alta:0,media:1,baja:2};
    const pendTasks=tasks.filter(t=>t.columnId!==doneId).sort((a,b)=>(prioOrder[a.priority]??1)-(prioOrder[b.priority]??1));
    const doneTasks=tasks.filter(t=>t.columnId===doneId);

    h+=`<div class="pan-list-group">
      <div class="pan-list-proj-hdr" onclick="setView('kanban','${proj.id}')">
        <span style="font-size:16px">${proj.icon}</span>
        <span class="pan-list-proj-name" style="color:${dot}">${esc(proj.name)}</span>
        <span class="pan-list-proj-count">${pendTasks.length} pendiente${pendTasks.length!==1?'s':''}</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="opacity:.3"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="pan-list-rows">`;

    pendTasks.forEach(t=>{
      const col=proj.columns.find(c=>c.id===t.columnId);
      const done=t.columnId===doneId;
      const isOv=!done&&t.date&&t.date<TODAY;
      const isTd=!done&&t.date===TODAY;
      let dateStr='';
      if(t.date){
        dateStr=isTd?'Hoy':isOv?'Vencida':t.date.split('-').reverse().join('/');
      }
      h+=`<div class="pan-list-row${done?' pan-list-done':''}" ${!done?`onclick="openTaskDetail('${t.id}',event)"`:''} style="${!done?'cursor:pointer':''}">
        ${!done
          ?`<button class="pcard-check pan-check" onclick="completeFromPan('${t.id}',this)" style="width:17px;height:17px;min-width:17px"></button>`
          :`<span class="pan-check-done"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--c-done)" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></span>`
        }
        <div class="pcard-prio-dot" style="background:${prioC[t.priority]||'var(--text3)'}"></div>
        <span class="pan-list-title">${esc(t.title)}</span>
        ${dateStr?`<span class="pan-list-date" style="color:${isOv?'var(--c-over)':isTd?'var(--accent)':'var(--text3)'}">${dateStr}</span>`:''}
      </div>`;
    });

    h+=`</div></div>`;
  });

  return h+'<div style="height:24px"></div>';
}

function getWeekStart(){
  const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d.getTime();
}

function pcardHTML(proj){
  const cols=(proj.columns||[]).filter(c=>c.id!=='done');
  if(!cols.length)return'';
  const colIdx=Math.min(S.panCol[proj.id]||0,cols.length-1);
  const col=cols[colIdx];
  const bg=palBg(proj.palKey);
  const dot=palDot(proj.palKey);
  const prioC={alta:'var(--c-over)',media:'var(--c-mid)',baja:'var(--text3)'};
  const colTasks=S.tasks.filter(t=>t.projectId===proj.id&&t.columnId===col.id).sort((a,b)=>(a.order||0)-(b.order||0)||a.createdAt-b.createdAt);
  const doneId=proj.columns.find(c=>c.id==='done')?.id;
  const allPend=S.tasks.filter(t=>t.projectId===proj.id&&t.columnId!==doneId);
  const doneTs=S.tasks.filter(t=>t.projectId===proj.id&&t.columnId===doneId);
  const overTs=allPend.filter(t=>t.date&&t.date<TODAY);
  const showQ=S.quickAdd[proj.id];
  const dots=cols.map((_,i)=>`<div class="pdot${i===colIdx?' active':''}"></div>`).join('');
  const tasks=colTasks.map(t=>{
    let dateTimeStr='';
    if(t.date){
      const d=new Date(t.date+'T00:00:00');
      const dayName=d.toLocaleDateString('es-AR',{weekday:'long'});
      const dayCapital=dayName.charAt(0).toUpperCase()+dayName.slice(1);
      dateTimeStr=dayCapital+(t.time?' '+t.time.replace(':','hs').replace(/^(\d+)hs(\d+)$/,(_,h,m)=>m==='00'?h+'hs':h+':'+m+'hs'):'');
    }
    return`<div class="pcard-task-row">
      <div class="pcard-check" onclick="completeFromPan('${t.id}',this)"></div>
      <div class="pcard-prio-dot" style="background:${prioC[t.priority]||'var(--text3)'}"></div>
      <div style="flex:1;min-width:0;display:flex;align-items:baseline;justify-content:space-between;gap:6px">
        <span class="pcard-task-txt">${esc(t.title)}</span>
        ${dateTimeStr?`<span style="font-size:10.5px;color:var(--text3);white-space:nowrap;font-style:italic;flex-shrink:0">${dateTimeStr}</span>`:''}
      </div>
    </div>`;
  }).join('');

  const ovStat=overTs.length?`<span class="pcard-stat has-over">${overTs.length} vencida${overTs.length>1?'s':''}</span>`:`<span class="pcard-stat">${doneTs.length} hechas</span>`;
  const footer=showQ?`
    <div class="pcard-quick-add">
      <input id="qa-inp-${proj.id}" placeholder="Nueva tarea..." onkeydown="handleQA(event,'${proj.id}')"/>
      <button class="pqa-cancel" onclick="cancelQA('${proj.id}')">✕</button>
      <button class="pqa-save" onclick="submitQA('${proj.id}')">+</button>
    </div>`:`
    <div class="pcard-footer">
      <div class="pcard-stats">${ovStat}<span class="pcard-stat">${allPend.length} pendiente${allPend.length!==1?'s':''}</span></div>
      <button class="pcard-add-btn" onclick="showQA('${proj.id}')"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Agregar</button>
    </div>`;

  return`<div class="pcard" id="pcard-${proj.id}" style="background:${bg};border-color:${dot}30"
    draggable="true"
    ondragstart="onPCardDragStart(event,'${proj.id}')"
    ondragend="onPCardDragEnd()"
    ondragover="onPCardDragOver(event,'${proj.id}')"
    ondrop="onPCardDrop(event,'${proj.id}')">
    <div class="pcard-accent" style="background:${dot}"></div>
    <div class="pcard-head">
      <div class="pcard-title-row" onclick="setView('kanban','${proj.id}')">
        <span class="pcard-icon">${proj.icon}</span>
        <span class="pcard-name" style="color:${dot}">${esc(proj.name)}</span>
      </div>
      <div class="pcard-head-btns">
        <button class="pin-btn${proj.pinned?' pinned':''}" onclick="toggleProjPin('${proj.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="${proj.pinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="pcard-col-nav">
      <button class="pcard-nav-btn" onclick="panNav('${proj.id}',-1)" ${colIdx===0?'disabled':''}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="pcard-col-name" style="color:${col.color||dot}">${esc(col.name)}</span>
      <button class="pcard-nav-btn" onclick="panNav('${proj.id}',1)" ${colIdx===cols.length-1?'disabled':''}>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="pcard-tasks">${colTasks.length?tasks:'<div class="pcard-empty">Sin tareas en esta columna</div>'}</div>
    <div class="pcard-dots">${dots}</div>
    ${footer}
  </div>`;
}

// ── PANORAMA DRAG ──
let dPCard=null,dPCardPinned=false;
window.onPCardDragStart=(e,projId)=>{dPCard=projId;const proj=S.projects.find(p=>p.id===projId);dPCardPinned=proj?.pinned||false;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('pcard-'+projId);if(el)el.style.opacity='.3';},0);};
window.onPCardDragEnd=()=>{dPCard=null;document.querySelectorAll('.pcard').forEach(el=>el.style.opacity='');};
window.onPCardDragOver=(e,projId)=>{e.preventDefault();if(!dPCard||dPCard===projId)return;e.dataTransfer.dropEffect='move';};
window.onPCardDrop=(e,targetId,targetPinned)=>{
  e.preventDefault();if(!dPCard||dPCard===targetId)return;
  const fromProj=S.projects.find(p=>p.id===dPCard);
  const toProj=S.projects.find(p=>p.id===targetId);
  if(!fromProj||!toProj)return;
  // Only reorder within same group (pinned<->pinned or unpinned<->unpinned)
  if(fromProj.pinned!==toProj.pinned)return;
  // Swap orders
  const fromOrder=fromProj.order??0;
  fromProj.order=toProj.order??0;
  toProj.order=fromOrder;
  saveData();render();
};

function renderKanban(){
  const proj=S.projects.find(p=>p.id===kanbanProjId);
  if(!proj)return`<div class="empty-state"><p>Categoría no encontrada</p></div>`;
  
  if(!S.hideDone)S.hideDone={};
  if(!S.showOver)S.showOver={};
  if(!S.colSort)S.colSort={};
  
  const cols=proj.columns||[];
  const showOverdue=!!S.showOver[proj.id];
  const hideDone=!!S.hideDone[proj.id];

  let h=`<div class="kanban-scroll" id="kanban-scroll">`;

  cols.forEach(col=>{
    const isDone=col.id==='done';
    
    // For done column: if hidden, skip entirely (no DOM space)
    if(isDone&&hideDone){
      return;
    }
    
    // Get tasks for this column
    let colTasks=S.tasks.filter(t=>t.projectId===proj.id&&t.columnId===col.id);
    
    // Always sort by priority
    const prioOrder={alta:0,media:1,baja:2};
    colTasks.sort((a,b)=>(prioOrder[a.priority]??1)-(prioOrder[b.priority]??1)||(a.order||0)-(b.order||0));
    
    // Overdue tasks (only for non-done columns)
    const overdueIds=new Set(
      isDone?[]:colTasks.filter(t=>t.date&&t.date<TODAY).map(t=>t.id)
    );
    
    // What to show
    const shown=colTasks;
    const overdueCount=overdueIds.size;
    h+=`<div class="k-col${isDone?' done-col':''}" id="kc-${col.id}">
      <div class="k-col-hdr" style="--cc:${col.color}">
        ${isDone
          ?`<span class="k-col-lbl">${esc(col.name)}</span>`
          :`<button class="col-color-dot" style="background:${col.color||'var(--accent)'}" onclick="openColColorPicker('${col.id}','${proj.id}',this)" title="Cambiar color"></button>
            <span class="k-col-lbl" ondblclick="renameCol('${col.id}','${proj.id}')">${esc(col.name)}</span>`
        }
        <span class="k-col-cnt">${shown.length}</span>
        ${isDone
          ?`<button class="icon-btn" onclick="toggleHideDone('${proj.id}')" title="Ocultar completadas">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
            <button class="icon-btn danger" onclick="clearDoneCol('${proj.id}')" title="Vaciar completadas">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>`
          :`<button class="icon-btn danger" onclick="delCol('${proj.id}','${col.id}')">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>`
        }
      </div>
      <div class="k-col-body" id="cb-${col.id}" data-col="${col.id}" data-proj="${proj.id}">
        ${shown.map(t=>cardHTML(t,proj,{mv:t.date===TODAY})).join('')}
      </div>
      ${!isDone?`<button class="col-add-btn" onclick="openT('${proj.id}','${col.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Agregar tarea</button>`:''}
    </div>`;
  });

  // Show "show completadas" button when hidden
  if(hideDone){
    h+=`<button class="add-col-btn" onclick="toggleHideDone('${proj.id}')" style="border-color:var(--c-done);color:var(--c-done)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Ver completadas
    </button>`;
  }

  h+=`<button class="add-col-btn" onclick="addCol('${proj.id}')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Nueva columna
  </button>`;

  return h+'</div>';
}

// ── FOCUS MODE ──
window.enterFocus=()=>{
  const fm=document.getElementById('focus-mode');
  fm.classList.add('active');
  const isDone=t=>{const p=S.projects.find(x=>x.id===t.projectId);return t.columnId===p?.columns.find(c=>c.id==='done')?.id;};
  const todayTasks=S.tasks.filter(t=>t.date===TODAY&&!isDone(t));
  const content=document.getElementById('focus-content');
  const title=document.getElementById('focus-title');
  title.textContent='Hoy — '+new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  if(!todayTasks.length){
    content.innerHTML=`<div class="focus-empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><p>No hay tareas para hoy 🎉</p></div>`;
    return;
  }
  content.innerHTML=todayTasks.map(t=>{
    const proj=S.projects.find(p=>p.id===t.projectId);
    const dot=proj?palDot(proj.palKey):'var(--accent)';
    return`<div class="focus-task">
      <div class="focus-check" onclick="completeFocusTask('${t.id}',this)"></div>
      <div>
        <div class="focus-task-title">${esc(t.title)}</div>
        ${proj?`<div class="focus-proj" style="color:${dot}">${proj.icon} ${esc(proj.name)}</div>`:''}
      </div>
    </div>`;
  }).join('');
};
window.exitFocus=()=>document.getElementById('focus-mode').classList.remove('active');
window.focusDragId=null;
window.focusDragStart=(id)=>{window.focusDragId=id;};
window.focusDrop=(e,targetId)=>{
  e.currentTarget.classList.remove('focus-drag-over');
  if(!window.focusDragId||window.focusDragId===targetId)return;
  const isDone=t=>{const p=S.projects.find(x=>x.id===t.projectId);return t.columnId===p?.columns.find(c=>c.id==='done')?.id;};
  const tasks=S.tasks.filter(t=>t.date===TODAY&&!isDone(t));
  if(!S.focusOrder||!S.focusOrder.length)S.focusOrder=tasks.map(t=>t.id);
  const fromIdx=S.focusOrder.indexOf(window.focusDragId);
  const toIdx=S.focusOrder.indexOf(targetId);
  if(fromIdx>-1&&toIdx>-1){S.focusOrder.splice(fromIdx,1);S.focusOrder.splice(toIdx,0,window.focusDragId);}
  else{S.focusOrder=tasks.map(t=>t.id);const fi=S.focusOrder.indexOf(window.focusDragId);const ti=S.focusOrder.indexOf(targetId);S.focusOrder.splice(fi,1);S.focusOrder.splice(ti,0,window.focusDragId);}
  window.focusDragId=null;
  saveData();enterFocus();
};
window.completeFocusTask=(tid,checkEl)=>{
  checkEl.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--c-done)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  checkEl.style.borderColor='var(--c-done)';checkEl.style.background='var(--c-done-dim)';
  const t=S.tasks.find(x=>x.id===tid);if(!t)return;
  const proj=S.projects.find(p=>p.id===t.projectId);
  const dc=proj?.columns.find(c=>c.id==='done');if(!dc)return;
  t.columnId=dc.id;if(t.repeat)regen(t);updateStreak();saveData();
  setTimeout(()=>{const el=checkEl.closest('.focus-task');if(el)el.style.opacity='.4';},500);
};

(function(){
  var _viewHistory=[];
  var _origSetView=null;
  function initBackNav(){
    // Push initial state
    history.replaceState({tf:true,view:'today'},'');
    // Wrap setView to push history
    _origSetView=window.setView;
    window.setView=function(v,projId){
      _origSetView(v,projId);
      history.pushState({tf:true,view:v,projId:projId||null},'');
    };
    window.addEventListener('popstate',function(e){
      if(e.state&&e.state.tf){
        // Navigate back within app
        _origSetView(e.state.view,e.state.projId||undefined);
      } else {
        // No more app history — ask to exit
        if(confirm('¿Salir de TaskFlow?')){
          history.back();
        } else {
          history.pushState({tf:true,view:window._currentView||'today'},'');
        }
      }
    });
  }
  // Run after app is ready
  window.addEventListener('load',function(){setTimeout(initBackNav,500);});
})();

// ── AGENDA BLOCK DRAG AND DROP ──
let _agendaDragTid=null,_agendaDragBlock=null,_agendaDragDate=null;

window.agendaDragStart=(e,tid,block,dateStr)=>{
  _agendaDragTid=tid;_agendaDragBlock=block;_agendaDragDate=dateStr;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.querySelector(`.agenda-task[data-tid="${tid}"]`);if(el)el.style.opacity='.3';},0);
};

window.agendaDragOver=(e)=>{
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  el.classList.add('agenda-task-dragover');
};

window.agendaDragLeave=(e)=>{
  e.currentTarget.classList.remove('agenda-task-dragover');
};

window.agendaDrop=(e,targetTid,targetBlock,dateStr)=>{
  e.preventDefault();
  e.currentTarget.classList.remove('agenda-task-dragover');
  if(!_agendaDragTid||_agendaDragTid===targetTid)return;
  
  if(!S.planDia||S.planDia.date!==dateStr){
    S.planDia={date:dateStr,manana:[],tarde:[],noche:[],notes:{manana:'',tarde:'',noche:''}};
  }
  
  // Remove from all blocks
  ['manana','tarde','noche'].forEach(b=>{
    S.planDia[b]=(S.planDia[b]||[]).filter(x=>x!==_agendaDragTid);
  });
  
  // Insert into target block at correct position (shift others down)
  const targetArr=S.planDia[targetBlock]||[];
  const targetIdx=targetArr.indexOf(targetTid);
  if(targetIdx>-1){
    targetArr.splice(targetIdx,0,_agendaDragTid);
  } else {
    // Add to target block if not present
    S.planDia[targetBlock]=(S.planDia[targetBlock]||[]);
    S.planDia[targetBlock].push(_agendaDragTid);
  }
  
  _agendaDragTid=null;_agendaDragBlock=null;_agendaDragDate=null;
  
  // Reset opacity
  document.querySelectorAll('.agenda-task').forEach(el=>el.style.opacity='');
  
  // Save immediately
  if(!offlineMode&&currentUser){
    isSaving=true;
    if(saveTimeout)clearTimeout(saveTimeout);
    setDoc(doc(db,'users',currentUser.uid,'data','main'),S).then(()=>{setSyncStatus('synced');}).catch(()=>{setSyncStatus('offline');}).finally(()=>{isSaving=false;});
  } else {saveData();}
  
  document.getElementById('view-today').innerHTML=renderToday();setupTodaySwipe();
};

function onDs(e,tid,col){dTask=tid;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('tc-'+tid);if(el)el.classList.add('dragging');},0);}
function onDe(){if(dTask){const el=document.getElementById('tc-'+dTask);if(el)el.classList.remove('dragging');}document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('da','db'));document.querySelectorAll('.k-col-body').forEach(c=>c.classList.remove('dov'));dTask=null;dOverTask=null;dOverPos=null;}
function onDov(e,oid){e.preventDefault();e.stopPropagation();if(!dTask||dTask===oid)return;const el=document.getElementById('tc-'+oid);if(!el)return;const r=el.getBoundingClientRect();const pos=e.clientY<r.top+r.height/2?'above':'below';document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('da','db'));el.classList.add(pos==='above'?'da':'db');dOverTask=oid;dOverPos=pos;}
function onDlv(oid){const el=document.getElementById('tc-'+oid);if(el)el.classList.remove('da','db');}
function onDdrop(e,oid){
  e.preventDefault();e.stopPropagation();if(!dTask)return;
  const task=S.tasks.find(t=>t.id===dTask);const over=S.tasks.find(t=>t.id===oid);if(!task||!over)return;
  const newCol=over.columnId;task.columnId=newCol;
  const cTasks=S.tasks.filter(t=>t.projectId===over.projectId&&t.columnId===newCol&&t.id!==dTask).sort((a,b)=>(a.order||0)-(b.order||0)||a.createdAt-b.createdAt);
  const oi=cTasks.findIndex(t=>t.id===oid);const ii=dOverPos==='above'?oi:oi+1;
  cTasks.splice(ii,0,task);cTasks.forEach((t,i)=>t.order=i);
  const proj=S.projects.find(p=>p.id===task.projectId);
  checkRegen(task,newCol,proj);
  if(newCol==='done'){updateStreak();completionBurst(window.innerWidth/2,window.innerHeight/2);}
  saveData();render();
}

function checkRegen(task,colId,proj){const dc=proj?.columns.find(c=>c.id==='done');if(dc&&colId===dc.id&&task.repeat)regen(task);}
function regen(t){
  let nd=t.date;
  if(nd){
    const d=new Date(nd);
    if(t.repeat==='daily')d.setDate(d.getDate()+1);
    else if(t.repeat==='weekly')d.setDate(d.getDate()+7);
    else if(t.repeat==='custom'&&t.repeatDays?.length){
      // find next occurrence
      const dayOfWeek=d.getDay();const mappedDay=dayOfWeek===0?6:dayOfWeek-1;
      let daysToNext=7;
      const sortedDays=[...t.repeatDays].sort((a,b)=>a-b);
      for(const day of sortedDays){const diff=(day-mappedDay+7)%7;if(diff>0&&diff<daysToNext)daysToNext=diff;}
      d.setDate(d.getDate()+daysToNext);
    }
    nd=localDateStr(d);
  }
  const proj=S.projects.find(p=>p.id===t.projectId);const fc=proj?.columns.find(c=>c.id!=='done')||proj?.columns[0];
  S.tasks.push({...t,id:uid(),columnId:fc?.id||'done',date:nd,createdAt:Date.now(),order:999,subtasks:[]});
}

function updateStreak(){
  const todayStr=localDateStr();
  // Use localStorage as source of truth to survive Firestore race conditions
  const lsDate=localStorage.getItem('tf_lastComplete');
  const lsStreak=parseInt(localStorage.getItem('tf_streak')||'0',10);
  // Sync S with localStorage if localStorage is newer
  const effectiveDate=lsDate||S.lastCompleteDate||null;
  const effectiveStreak=lsStreak||S.streak||0;
  if(effectiveDate===todayStr)return; // already counted today
  const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
  const yStr=localDateStr(yesterday);
  const newStreak=effectiveDate===yStr?effectiveStreak+1:1;
  S.streak=newStreak;
  S.lastCompleteDate=todayStr;
  localStorage.setItem('tf_lastComplete',todayStr);
  localStorage.setItem('tf_streak',String(newStreak));
}

window.mvCol=(tid,colId,evt)=>{

  checkRegen(t,colId,proj);
  const isDoneCol=proj?.columns.find(c=>c.id==='done')?.id===colId;
  if(isDoneCol){
    updateStreak();
    // Trigger burst animation
    if(evt){const r=evt.target.getBoundingClientRect();completionBurst(r.left+r.width/2,r.top+r.height/2);}
    else completionBurst(window.innerWidth/2,window.innerHeight/2);
  }
  saveData();render();
};

window.togglePin=async(tid)=>{

  const idx=S.pinnedTasks.indexOf(tid);

  const task=S.tasks.find(t=>t.id===tid);

  } else {

  }
};

// ── ATTACH KANBAN DND ──
function attachKanbanDnd(){
  const proj=S.projects.find(p=>p.id===kanbanProjId);if(!proj)return;

  // Mobile: long-press sheet (no drag)
  const isMobile=('ontouchstart' in window)&&window.innerWidth<1024;
  if(isMobile){
    setupMobileKanbanLongPress(proj);
    return;
  }

  // Desktop: native HTML5 drag & drop on column bodies (for drop into empty columns)
  proj.columns.forEach(col=>{
    const body=document.getElementById('cb-'+col.id);
    if(!body)return;

    body.addEventListener('dragover',e=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      // Only highlight if dragging over the empty area (not over a card)
      if(!e.target.closest('.task-card')){
        document.querySelectorAll('.k-col-body').forEach(b=>b.classList.remove('dov'));
        body.classList.add('dov');
      }
    });

    body.addEventListener('dragleave',e=>{
      // Only remove highlight if leaving the column body entirely
      if(!body.contains(e.relatedTarget)){
        body.classList.remove('dov');
      }
    });

    body.addEventListener('drop',e=>{
      e.preventDefault();
      body.classList.remove('dov');
      if(!dTask)return;
      // If dropped on a card, let the card's ondrop handle it
      if(e.target.closest('.task-card'))return;
      // Dropped on empty column area → move task to this column, append at end
      const task=S.tasks.find(t=>t.id===dTask);
      if(!task)return;
      const newColId=body.dataset.col;
      const projId=body.dataset.proj;
      if(!newColId||!projId||task.columnId===newColId)return;
      task.columnId=newColId;
      // Put it last
      const colTasks=S.tasks.filter(t=>t.projectId===projId&&t.columnId===newColId);
      task.order=colTasks.length;
      checkRegen(task,newColId,proj);
      if(newColId==='done'){updateStreak();completionBurst(window.innerWidth/2,window.innerHeight/2);}
      saveData();render();
    });
  });
}

window.moveTaskToCol=(taskId,colId,projId)=>{
  document.getElementById('move-sheet-overlay')?.remove();
  const task=S.tasks.find(t=>t.id===taskId);if(!task)return;
  const proj=S.projects.find(p=>p.id===projId);if(!proj)return;
  const oldColId=task.columnId;
  if(oldColId===colId)return; // already there
  task.columnId=colId;
  checkRegen(task,colId,proj);
  const isDoneCol=proj.columns.find(c=>c.id==='done')?.id===colId;
  if(isDoneCol){
    updateStreak();
    completionBurst(window.innerWidth/2,window.innerHeight/2);
  }
  saveData();render();
  const col=proj.columns.find(c=>c.id===colId);
  showToast(`✓ Movida a ${col?.name||'columna'}`);
};

// ── TOUCH DRAG FOR PROJECTS (mobile) ──
function setupTouchDragProjects(){
  let dragEl=null,dragId=null,clone=null,startY=0,longPressTimer=null;
  
  function addTouchDrag(el,projId){
    el.addEventListener('touchstart',e=>{
      if(e.touches.length!==1)return;
      startY=e.touches[0].clientY;
      longPressTimer=setTimeout(()=>{
        dragId=projId;dragEl=el;
        el.style.opacity='.4';
        showToast('Arrastrá para reordenar');
      },500);
    },{passive:true});
    
    el.addEventListener('touchmove',e=>{
      clearTimeout(longPressTimer);
      if(!dragId)return;
      e.preventDefault();
      const touch=e.touches[0];
      // find element under touch
      const underEl=document.elementFromPoint(touch.clientX,touch.clientY);
      const targetItem=underEl?.closest('[data-proj-id]');
      if(targetItem&&targetItem.dataset.projId!==dragId){
        const targetId=targetItem.dataset.projId;
        const from=S.projects.find(p=>p.id===dragId);
        const to=S.projects.find(p=>p.id===targetId);
        if(from&&to){const fo=from.order??0;from.order=to.order??0;to.order=fo;render();}
      }
    },{passive:false});
    
    el.addEventListener('touchend',()=>{
      clearTimeout(longPressTimer);
      if(dragEl)dragEl.style.opacity='';
      dragId=null;dragEl=null;
    });
  }
  
  // Apply to proj list items
  document.querySelectorAll('[data-proj-id]').forEach(el=>addTouchDrag(el,el.dataset.projId));
}

function getRandQuote(){return QUOTES[Math.floor(Math.random()*QUOTES.length)];}

function formatTime(secs){
  const m=Math.floor(secs/60),s=secs%60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateTimerDisplay(){
  const el=document.getElementById('focus-timer');if(!el)return;
  el.textContent=formatTime(pomodoroSeconds);
  const pct=pomodoroSeconds/pomodoroTotal;
  el.className='focus-timer-display'+(pct<0.15?' urgent':'');
  const startBtn=document.getElementById('focus-start-btn');
  if(startBtn)startBtn.textContent=pomodoroRunning?'⏸ Pausar':'▶ Iniciar';
}

function startStopPomodoro(){
  if(pomodoroRunning){
    // Pause
    clearInterval(pomodoroInterval);pomodoroRunning=false;
    const fm=document.getElementById('focus-mode');
    if(fm){fm.className='focus-mode idle';fm.style.display='flex';}
  } else {
    if(pomodoroSeconds<=0){
      // Reset and start
      pomodoroSeconds=pomodoroTotal;
    }
    pomodoroRunning=true;
    const fm=document.getElementById('focus-mode');
    if(fm){fm.className='focus-mode running';fm.style.display='flex';}
    pomodoroInterval=setInterval(()=>{
      pomodoroSeconds--;
      updateTimerDisplay();
      if(pomodoroSeconds<=0){
        clearInterval(pomodoroInterval);pomodoroRunning=false;
        onPomodoroComplete();
      }
    },1000);
  }
  updateTimerDisplay();
}

function resetPomodoro(){
  clearInterval(pomodoroInterval);pomodoroRunning=false;
  pomodoroSeconds=pomodoroTotal;
  const fm=document.getElementById('focus-mode');
  if(fm){fm.className='focus-mode idle';fm.style.display='flex';}
  updateTimerDisplay();
  const cel=document.getElementById('focus-cel');if(cel)cel.classList.remove('show');
}

function onPomodoroComplete(){
  const fm=document.getElementById('focus-mode');
  if(fm){fm.className='focus-mode done';fm.style.display='flex';}
  // Notification
  if('Notification' in window&&Notification.permission==='granted'){
    new Notification('⚡ TaskFlow — ¡Foco completado!',{body:'Completaste '+formatTime(S?.pomodoroMins?S.pomodoroMins*60:pomodoroTotal)+' de trabajo enfocado. ¡Excelente!',icon:'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxOTIgMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgcng9IjM4IiBmaWxsPSIjMDg5MWIyIi8+PHRleHQgeD0iOTYiIHk9IjEzMCIgZm9udC1zaXplPSIxMjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIj7imqE8L3RleHQ+PC9zdmc+'});
  }
  // Vibrate
  if('vibrate' in navigator)navigator.vibrate([200,100,200,100,400]);
  const cel=document.getElementById('focus-cel');if(cel)cel.classList.add('show');
  // Rotate quote
  const qEl=document.getElementById('focus-quote');
  if(qEl){qEl.style.opacity='0';setTimeout(()=>{qEl.textContent=`"${getRandQuote()}"`;qEl.style.opacity='1';},400);}
  updateStreak();saveData();
}

        ontouchstart="pomodoroLongPressTimer=setTimeout(handleTimerDoubleTap,800)"

        ${formatTime(pomodoroSeconds)}

  updateTimerDisplay();

  // Rotate quote every 30s
  if(window._quoteInterval)clearInterval(window._quoteInterval);
  window._quoteInterval=setInterval(()=>{
    const qEl=document.getElementById('focus-quote');
    if(qEl){qEl.style.opacity='0';setTimeout(()=>{qEl.textContent=`"${getRandQuote()}"`;qEl.style.opacity='1';},400);}

window.completeFocusTask=(tid)=>{
  const t=S.tasks.find(x=>x.id===tid);if(!t)return;
  const proj=S.projects.find(p=>p.id===t.projectId);
  const dc=proj?.columns.find(c=>c.id==='done');if(!dc)return;
  t.columnId=dc.id;if(t.repeat)regen(t);
  // Sync: remove from focusNow
  if(S.focusNow)S.focusNow=S.focusNow.filter(x=>x!==tid);
  updateStreak();saveData();render();
  // Animate and move to bottom
  const taskEl=document.getElementById('ftask-'+tid);

    setTimeout(()=>{

};

function spawnParticles(){
  const container=document.getElementById('focus-particles');if(!container)return;
  const colors=['#6c6ff5','#10b981','#f5a623','#f0524f','#ffffff'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    const size=Math.random()*6+3;
    const x=Math.random()*100;
    const color=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`position:absolute;width:${size}px;height:${size}px;border-radius:50%;background:${color};left:${x}%;top:60%;opacity:1;transition:all 1.2s cubic-bezier(.25,.46,.45,.94);pointer-events:none`;

}

window.onPCardDragStart=(e,projId)=>{
  dPCard=projId;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',projId);
  e.stopPropagation();
  setTimeout(()=>{const el=document.getElementById('pcard-'+projId);if(el)el.style.opacity='.35';},0);
};
window.onPCardDragEnd=()=>{
  dPCard=null;
  document.querySelectorAll('.pcard').forEach(el=>{el.style.opacity='';el.style.outline='';});
};
window.onPCardDragOver=(e,projId)=>{
  e.preventDefault();e.stopPropagation();
  if(!dPCard||dPCard===projId)return;
  const fromProj=S.projects.find(p=>p.id===dPCard);
  const toProj=S.projects.find(p=>p.id===projId);
  if(!fromProj||!toProj||fromProj.pinned!==toProj.pinned)return;
  document.querySelectorAll('.pcard').forEach(el=>el.style.outline='');
  const el=document.getElementById('pcard-'+projId);
  if(el)el.style.outline='2px dashed var(--accent)';
};
window.onPCardDrop=(e,targetId)=>{
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.pcard').forEach(el=>{el.style.outline='';el.style.opacity='';});
  const fromId=e.dataTransfer.getData('text/plain')||dPCard;
  if(!fromId||fromId===targetId){dPCard=null;return;}
  const from=S.projects.find(p=>p.id===fromId);
  const to=S.projects.find(p=>p.id===targetId);
  if(!from||!to||from.pinned!==to.pinned){dPCard=null;return;}
  // proper reorder within pinned/unpinned group
  const group=S.projects.filter(p=>p.pinned===from.pinned).sort((a,b)=>(a.order??0)-(b.order??0));
  const fi=group.findIndex(p=>p.id===fromId);
  const ti=group.findIndex(p=>p.id===targetId);
  group.splice(fi,1);group.splice(ti,0,from);
  // reassign orders keeping non-group projects intact
  const otherProjs=S.projects.filter(p=>p.pinned!==from.pinned);
  const otherMax=Math.max(0,...otherProjs.map(p=>p.order??0));
  group.forEach((p,i)=>p.order=otherMax+i+1);
  // normalize all
  const allSorted=[...S.projects].sort((a,b)=>(a.order??0)-(b.order??0));
  allSorted.forEach((p,i)=>p.order=i);
  dPCard=null;saveData();render();
};

};

  document.getElementById('pdia-sel-overlay')?.remove();
  render();
};

<script>
// ── VISTA SEMANA ──
var semanaOffset = 0;
var semanaDragId = null;
var semanaDragDate = null;

function semanaDateKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function semanaGetWeek() {
  var isMobile = window.innerWidth < 768;
  var now = new Date();
  now.setHours(0,0,0,0);
  var start = new Date(now);
  if (isMobile) {
    // Mobile: start from yesterday so today is day 2 (visible without scrolling)
    start.setDate(now.getDate() - 1 + semanaOffset * 7);
  } else {
    // Desktop: start from Monday of current week
    var dow = now.getDay();
    start.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1) + semanaOffset * 7);
  }
  start.setHours(0,0,0,0);
  return [0,1,2,3,4,5,6].map(function(i) {
    var d = new Date(start);
    d.setDate(start.getDate() + i);
    return d;
  });
}

function renderSemana() {
  var days = semanaGetWeek();
  var DAY_NAMES = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  var MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var TODAY_KEY = window.TODAY || new Date().toISOString().slice(0,10);

  function isDone(t) {
    var p = window.S.projects.find(function(x){return x.id===t.projectId;});
    return t.columnId === (p && p.columns.find(function(c){return c.id==='done';}) || {}).id;
  }

  var first = days[0], last = days[6];
  var rangeLabel = first.getDate() + ' ' + MONTHS[first.getMonth()] + ' — ' + last.getDate() + ' ' + MONTHS[last.getMonth()] + ' ' + last.getFullYear();
  var showToday = semanaOffset !== 0 ? '<button class="semana-today-btn" onclick="window.semanaGoToday()">Hoy</button>' : '';

  var h = '<div class="semana-wrap">';
  h += '<div class="semana-nav">';
  h += '<button class="semana-nav-btn" onclick="window.semanaMove(-1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>';
  h += '<div style="display:flex;align-items:center;gap:10px"><span class="semana-nav-title">' + rangeLabel + '</span>' + showToday + '</div>';
  h += '<button class="semana-nav-btn" onclick="window.semanaMove(1)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></button>';
  h += '</div>';
  h += '<div class="semana-grid-wrap"><div class="semana-grid">';

  days.forEach(function(day, idx) {
    var dateKey = semanaDateKey(day);
    var isToday = dateKey === TODAY_KEY;
    var tasks = window.S.tasks
      .filter(function(t){return t.date===dateKey && !isDone(t);})
      .sort(function(a,b){
        if(a.time&&b.time)return a.time.localeCompare(b.time);
        if(a.time)return -1; if(b.time)return 1;
        return (a.order||0)-(b.order||0);
      });

    h += '<div class="semana-col">';
    h += '<div class="semana-col-hdr' + (isToday?' is-today':'') + '">';
    h += '<div><div class="semana-day-name">' + DAY_NAMES[idx] + '</div>';
    h += '<div class="semana-day-num' + (isToday?' is-today-num':'') + '">' + day.getDate() + '</div></div>';
    h += '<button class="semana-add-btn" onclick="window.semanaShowAddMenu(event,\'' + dateKey + '\')" title="Agregar tarea">';
    h += '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>';
    h += '</div>';
    h += '<div class="semana-tasks">';

    if (!tasks.length) {
      h += '<div class="semana-empty">—</div>';
    } else {
      tasks.forEach(function(t) {
        var proj = window.S.projects.find(function(p){return p.id===t.projectId;});
        var color = proj && window.palDot ? window.palDot(proj.palKey) : 'var(--accent)';
        var done = isDone(t);
        h += '<div class="semana-task' + (done?' is-done':'') + '" draggable="true" data-tid="' + t.id + '" data-date="' + dateKey + '" style="border-left-color:' + color + '" onclick="window.semanaTaskMenu(event,\'' + t.id + '\')">'; 
        h += '<div style="display:flex;align-items:flex-start;gap:6px">';
        h += '<div style="flex:1;min-width:0"><p class="semana-task-title">' + (window.esc ? window.esc(t.title) : t.title) + '</p>';
        h += '<div class="semana-task-meta">';
        if (t.time) h += '<span class="semana-task-time">' + t.time + '</span>';
        if (proj) h += '<span class="semana-task-proj">' + proj.icon + ' ' + (window.esc ? window.esc(proj.name) : proj.name) + '</span>';
        h += '</div></div></div></div>';
      });
    }

    h += '</div></div>';
  });

  h += '</div></div></div>';
  return h;
}

window.semanaDragStart = function(e, tid, dateKey) {
  semanaDragId = tid;
  semanaDragDate = dateKey;
  setTimeout(function(){ 
    var el = document.querySelector('[data-tid="' + tid + '"]');
    if(el) el.classList.add('dragging');
  }, 0);
};

window.semanaDragEnd = function() {
  document.querySelectorAll('.semana-task.dragging').forEach(function(el){el.classList.remove('dragging');});
  document.querySelectorAll('.semana-task.drag-over').forEach(function(el){el.classList.remove('drag-over');});
};

window.semanaDragOver = function(e, tid) {
  e.preventDefault();
  document.querySelectorAll('.semana-task.drag-over').forEach(function(el){el.classList.remove('drag-over');});
  if(tid !== semanaDragId) {
    var el = document.querySelector('[data-tid="' + tid + '"]');
    if(el) el.classList.add('drag-over');
  }
};

window.semanaDrop = function(e, tid, dateKey) {
  e.preventDefault();
  document.querySelectorAll('.semana-task.drag-over,.semana-task.dragging').forEach(function(el){
    el.classList.remove('drag-over','dragging');
  });
  if(!semanaDragId || semanaDragId === tid) return;
  
  // Get tasks for this date sorted by current order
  var dateTasks = window.S.tasks.filter(function(t){return t.date===dateKey;});
  dateTasks.sort(function(a,b){return (a.order||0)-(b.order||0)||a.createdAt-b.createdAt;});
  
  var fromTask = window.S.tasks.find(function(t){return t.id===semanaDragId;});
  var toTask = window.S.tasks.find(function(t){return t.id===tid;});
  if(!fromTask||!toTask) return;
  
  // Assign orders
  dateTasks.forEach(function(t,i){ t.order = i * 10; });
  var fromOrder = fromTask.order;
  var toOrder = toTask.order;
  fromTask.order = toOrder;
  toTask.order = fromOrder;
  
  semanaDragId = null;
  if(window.saveData) window.saveData();
  document.getElementById('view-semana').innerHTML = renderSemana();
};

window.semanaMove = function(dir) {
  semanaOffset += dir;
  document.getElementById('view-semana').innerHTML = renderSemana();
  attachSemanaDnd();
};

window.semanaGoToday = function() {
  semanaOffset = 0;
  document.getElementById('view-semana').innerHTML = renderSemana();
  attachSemanaDnd();
};

window.semanaAddDate = null;
window.semanaSelStep = 'proj';
window.semanaSelProjId = null;

window.semanaShowAddMenu = function(e, dateStr) {
  e.stopPropagation();
  document.querySelectorAll('.semana-add-menu,.semana-menu').forEach(function(m){m.remove();});
  window.semanaAddDate = dateStr;
  var menu = document.createElement('div');
  menu.className = 'semana-add-menu';
  var rect = e.currentTarget.getBoundingClientRect();
  menu.style.cssText = 'top:' + (rect.bottom+4) + 'px;left:' + rect.left + 'px;';
  menu.innerHTML =
    '<div class="semana-add-menu-item" onclick="window.semanaNewTask()">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nueva tarea</div>' +
    '<div class="semana-add-menu-item" onclick="window.semanaExistingTask()">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Tarea existente</div>';
  document.body.appendChild(menu);
  setTimeout(function(){document.addEventListener('click', function(){menu.remove();}, {once:true});}, 0);
};

window.semanaNewTask = function() {
  document.querySelectorAll('.semana-add-menu').forEach(function(m){m.remove();});
  if (window.openT) window.openT(null, null, window.semanaAddDate);
};

window.semanaExistingTask = function() {
  document.querySelectorAll('.semana-add-menu').forEach(function(m){m.remove();});
  window.semanaSelStep = 'proj';
  window.semanaSelProjId = null;
  window.semanaRenderSel();
};

window.semanaRenderSel = function() {
  document.querySelectorAll('.semana-sel-overlay').forEach(function(m){m.remove();});
  var overlay = document.createElement('div');
  overlay.className = 'semana-sel-overlay';
  overlay.id = 'semana-sel-overlay';
  overlay.onclick = function(e){ if(e.target===overlay) overlay.remove(); };

  var inner = '<div class="semana-sel-sheet">';

  if (window.semanaSelStep === 'proj') {
    inner += '<div class="semana-sel-title">Elegí un proyecto</div>';
    window.S.projects.forEach(function(p) {
      var pending = window.S.tasks.filter(function(t){
        var isDone = t.columnId === (p.columns.find(function(c){return c.id==='done';})||{}).id;
        return t.projectId === p.id && !isDone;
      });
      if (!pending.length) return;
      inner += '<div class="semana-sel-item" data-pid="' + p.id + '">' +
        '<span style="font-size:18px">' + p.icon + '</span>' +
        '<span>' + (window.esc ? window.esc(p.name) : p.name) + '</span>' +
        '<span style="margin-left:auto;font-size:11px;color:var(--text3)">' + pending.length + '</span></div>';
    });
  } else {
    var proj = window.S.projects.find(function(p){return p.id===window.semanaSelProjId;});
    var doneId = proj ? (proj.columns.find(function(c){return c.id==='done';})||{}).id : null;
    var tasks = proj ? window.S.tasks.filter(function(t){return t.projectId===proj.id && t.columnId!==doneId;}) : [];
    inner += '<button class="semana-sel-back" onclick="window.semanaSelBack()">' +
      '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>Volver</button>';
    inner += '<div class="semana-sel-title">' + (proj ? proj.icon + ' ' + (window.esc ? window.esc(proj.name) : proj.name) : '') + '</div>';
    if (!tasks.length) {
      inner += '<div class="semana-sel-empty">Sin tareas pendientes</div>';
    } else {
      tasks.forEach(function(t) {
        inner += '<div class="semana-sel-item" data-tid="' + t.id + '">' +
          (window.esc ? window.esc(t.title) : t.title) + '</div>';
      });
    }
  }

  inner += '</div>';
  overlay.innerHTML = inner;
  document.body.appendChild(overlay);
  // Event delegation for data-attribute items
  overlay.querySelector('.semana-sel-sheet').addEventListener('click', function(e) {
    var item = e.target.closest('[data-pid]');
    if (item) { window.semanaSelProj(item.dataset.pid); return; }
    var titem = e.target.closest('[data-tid]');
    if (titem) { window.semanaAssignTask(titem.dataset.tid); return; }
  });
};

window.semanaSelProj = function(pid) {
  window.semanaSelProjId = pid;
  window.semanaSelStep = 'task';
  window.semanaRenderSel();
};

window.semanaSelBack = function() {
  window.semanaSelStep = 'proj';
  window.semanaSelProjId = null;
  window.semanaRenderSel();
};

function attachSemanaDnd() {
  var grid = document.querySelector('.semana-grid-wrap');
  if(!grid) return;
  // Remove old listeners by cloning
  grid.querySelectorAll('.semana-task').forEach(function(el) {
    el.ondragstart = function(e) {
      semanaDragId = el.dataset.tid;
      semanaDragDate = el.dataset.date;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function(){ el.classList.add('dragging'); }, 0);
    };
    el.ondragend = function() {
      document.querySelectorAll('.semana-task').forEach(function(t){
        t.classList.remove('dragging','drag-over');
      });
    };
    el.ondragover = function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.semana-task.drag-over').forEach(function(t){t.classList.remove('drag-over');});
      if(el.dataset.tid !== semanaDragId) el.classList.add('drag-over');
    };
    el.ondragleave = function() { el.classList.remove('drag-over'); };
    el.ondrop = function(e) {
      e.preventDefault();
      el.classList.remove('drag-over');
      if(!semanaDragId || semanaDragId === el.dataset.tid) return;
      var targetDate = el.dataset.date;
      var dateTasks = window.S.tasks.filter(function(t){return t.date===targetDate;});
      dateTasks.sort(function(a,b){return (a.order||0)-(b.order||0)||a.createdAt-b.createdAt;});
      dateTasks.forEach(function(t,i){ t.order = i * 10; });
      var fromTask = window.S.tasks.find(function(t){return t.id===semanaDragId;});
      var toTask = window.S.tasks.find(function(t){return t.id===el.dataset.tid;});
      if(!fromTask||!toTask) return;
      var tmp = fromTask.order;
      fromTask.order = toTask.order;
      toTask.order = tmp;
      semanaDragId = null;
      if(window.saveData) window.saveData();
      document.getElementById('view-semana').innerHTML = renderSemana();
      attachSemanaDnd();
    };
  });
}

window.semanaAssignTask = function(tid) {
  document.querySelectorAll('.semana-sel-overlay').forEach(function(m){m.remove();});
  var t = window.S.tasks.find(function(x){return x.id===tid;});
  if (t && window.semanaAddDate) {
    t.date = window.semanaAddDate;
    if (window.saveData) window.saveData();
    if (window.render) window.render();
  }
};

window.semanaTaskMenu = function(e, tid) {
  e.stopPropagation();
  document.querySelectorAll('.semana-menu').forEach(function(m){m.remove();});
  var t = window.S.tasks.find(function(x){return x.id===tid;});
  var proj = t ? window.S.projects.find(function(p){return p.id===t.projectId;}) : null;
  var doneCol = proj ? proj.columns.find(function(c){return c.id==='done';}) : null;
  var done = t && doneCol && t.columnId === doneCol.id;
  var menu = document.createElement('div');
  menu.className = 'semana-menu';
  menu.innerHTML =
    '<div class="semana-menu-item done-item" onclick="window.semanaComplete(\'' + tid + '\')">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>' +
    (done ? 'Marcar pendiente' : 'Marcar completada') + '</div>' +
    '<div class="semana-menu-item" onclick="window.openEditT(\'' + tid + '\');document.querySelectorAll(\'.semana-menu\').forEach(function(m){m.remove();})">' +
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Editar</div>';
  var rect = e.currentTarget.getBoundingClientRect();
  menu.style.cssText = 'top:' + (rect.bottom+4) + 'px;left:' + rect.left + 'px;';
  document.body.appendChild(menu);
  setTimeout(function(){document.addEventListener('click', function(){menu.remove();}, {once:true});}, 0);
};

window.semanaComplete = function(tid) {
  document.querySelectorAll('.semana-menu').forEach(function(m){m.remove();});
  var t = window.S.tasks.find(function(x){return x.id===tid;});
  if (!t) return;
  var proj = window.S.projects.find(function(p){return p.id===t.projectId;});
  var doneCol = proj ? proj.columns.find(function(c){return c.id==='done';}) : null;
  var isDone = doneCol && t.columnId === doneCol.id;
  if (isDone) {
    var firstCol = proj ? proj.columns.find(function(c){return c.id!=='done';}) : null;
    if (firstCol) t.columnId = firstCol.id;
  } else {
    if (doneCol) t.columnId = doneCol.id;
  }
  if (window.saveData) window.saveData();
  if (window.render) window.render();
};
</script>

<div class="nexo-k-overlay" id="nexoKOverlay"><div class="nexo-k-modal"><div class="nexo-k-head"><div class="nexo-k-title"><img src="../assets/nexo.svg" alt="">NEXO · Ir a</div><input class="nexo-k-input" id="nexoKInput" placeholder="Buscar app..." autocomplete="off"></div><div class="nexo-k-list" id="nexoKList"><a class="nexo-k-item" data-name="nexo inicio sistema central" href="../"><b><img src="../assets/nexo.svg" alt=""></b><span>Nexo</span></a><a class="nexo-k-item" data-name="cumbre objetivos seguimiento progreso metas" href="../cumbre/"><b><img src="../assets/icon-cumbre-v3.png" alt=""></b><span>Cumbre</span></a><a class="nexo-k-item" data-name="overview panorama general calendario planificacion" href="../overview/"><b><img src="../assets/icon-overview-v3.ico" alt=""></b><span>Overview</span></a><a class="nexo-k-item" data-name="taskflow ejecucion diaria tareas proyectos habitos" href="../taskflow/"><b>⚡</b><span>TaskFlow</span></a></div></div></div>
<script id="nexo-nav-script">(function(){var fab=document.getElementById("nexoFab"),panel=document.getElementById("nexoPanel"),overlay=document.getElementById("nexoKOverlay"),input=document.getElementById("nexoKInput"),list=document.getElementById("nexoKList"),items=[].slice.call(list.querySelectorAll(".nexo-k-item"));function closeAll(){panel.classList.remove("open");overlay.classList.remove("open")}fab.addEventListener("click",function(e){e.stopPropagation();panel.classList.toggle("open")});document.addEventListener("click",function(e){if(!panel.contains(e.target)&&e.target!==fab)panel.classList.remove("open")});function openPalette(){overlay.classList.add("open");input.value="";items.forEach(function(i){i.style.display="flex";i.classList.remove("active")});if(items[0])items[0].classList.add("active");setTimeout(function(){input.focus()},30)}function filter(){var q=input.value.toLowerCase().trim(),visible=[];items.forEach(function(i){var ok=!q||i.dataset.name.indexOf(q)>-1||i.textContent.toLowerCase().indexOf(q)>-1;i.style.display=ok?"flex":"none";i.classList.remove("active");if(ok)visible.push(i)});if(visible[0])visible[0].classList.add("active")}document.addEventListener("keydown",function(e){if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openPalette()}if(e.key==="Escape")closeAll();if(e.key==="Enter"&&overlay.classList.contains("open")){var active=list.querySelector(".nexo-k-item.active");if(active){e.preventDefault();window.location.href=active.href}}});input.addEventListener("input",filter);overlay.addEventListener("click",function(e){if(e.target===overlay)closeAll()})})();</script>

<script id="taskflow-modal-guard">(function(){function sync(){var modal=document.querySelector('.overlay[style*="display: block"],.overlay:not([style*="display:none"]),.sheet,.focus-mode.active,.pdia-sel-overlay');document.body.classList.toggle('nexo-modal-open',!!modal)}new MutationObserver(sync).observe(document.body,{childList:true,subtree:true,attributes:true,attributeFilter:['class','style']});document.addEventListener('click',function(){setTimeout(sync,0)},true);sync();})();</script>
